<script type="text/javascript">
  function set_timepicker() {
    var max_time = "23:55";
    var spwidth = $(window).width();
    var pcwidth = 768;
    if (spwidth <= pcwidth) {
    // 767px以下の時はselectで時間を選択
      $(".ui-timepicker-input").attr("type","time");
      $('input[type="time"]').each(function() {
        var val = $(this).val();
        $(this).removeAttr("value");
        $(this).val(val || $(this).data("reset-default"));
      });
    } else {
    // 767px以上の時はtextで時間を選択
      $(".ui-timepicker-input").attr("type","text");
      $(".ui-timepicker-input").timepicker({step: "5", timeFormat: "H:i", maxTime: max_time});
    }
  }

  $(window).on('load resize', function(){
    set_timepicker();
  });

<script type="text/javascript">
  $(document).ready(function(){
    var no_reset_names = ["[id]", "[_destroy]"];

    var daily_report = new RailsFormCopy({
      area_name: ".daily_report_area",
      form_name: ".daily_report_form",
      add_name: ".add_daily_report",
      des_name: ".des_daily_report",
      attribute_name: "reports_attributes",
      min_count: 0,
      max_count: 100000,
      no_reset_names: no_reset_names,
      add_area_name: ".daily_report_form"
    });

    $(document).on("click", ".add_daily_report", function() {
      var add_area = daily_report.area_add(this);
      initialize_select_tags(add_area);
      set_timepicker();
      reload_chosen(add_area);
      $(add_area).find('.result_time').html("0:00")
    });

    $(document).on("click", ".des_daily_report", function() {
      if (confirm("本当に削除しますか？") == false) return;
      daily_report.area_destroy(this);
      daily_report.all_form_disabled(this, true);
      daily_report.check_button(this);
    });

    $(document).on("click", ".duplicate_daily_report", function() {
      var copy_area = daily_report.area_add(this, null, true);
      daily_report.check_button(this);
      set_timepicker();
      reload_chosen(copy_area);
    });

    $(document).on('compositionend', '.chosen-search-input', function() {
      $(this).trigger(jQuery.Event('keyup'));
    });

    $(".daily_report_area").each(function() {
      $(this).find(".daily_report_form").each(function() {
        if ($(this).css("display") == "none") {
          (new RailsFormCopy({})).all_form_disabled(this, true);
        }
        daily_report.check_button(this);
      });
    });
  });

  function initialize_select_tags(form) {
    var business_partner_select = $(form).find(".business_partner_on_lodgment")
    var project_select = $(form).find(".project_id")
    var service_medium = $(form).find(".service_medium")
    var service_medium_select = $(service_medium).find(".service_medium_category_id")
    var service_category = $(form).find(".service_category")
    var service_category_select = $(service_category).find(".service_category_id")

    var select_tags = [business_partner_select, project_select, service_medium_select, service_category_select]

    $(select_tags).each(function() {
      $(this).find("option").remove();
      $(this).append('<option value="">選択してください</option>');
    });

    $(service_medium).hide();
    $(service_category).hide();
  }

  function reload_chosen(area) {
    $(area).find('.chosen-container').each(function() {
      $(this).remove();
    });
    $(area).find('.chosen').each(function() {
      $(this).show();
      $(this).chosen();
    });
  }

  $(function() {
    var change_count = 0
    $(document).on("change", ".change_count", function(){
      change_count += 1
    });

    $(document).on("click", ".change_count_btn", function(){
      change_count += 1
    });

    if ($(".error").text().trim().length > 0) { change_count += 1 }

    $(".btnBackConfirm").on('click',function(){
      if (change_count === 0 || confirm("入力した内容を全て破棄します。よろしいですか？")) {
        window.location = "/daily_reports/34127"
      }
    });
  });
</script>
