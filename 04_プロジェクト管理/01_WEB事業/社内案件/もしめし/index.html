<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>もしめし 🍳 - AI食材フュージョン</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #0d0b1e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
      overflow-x: hidden;
    }

    /* ---- Header ---- */
    header {
      text-align: center;
      padding: 2.5rem 1rem 0.5rem;
    }
    .logo {
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      margin-top: 0.4rem;
    }

    /* ---- API Key ---- */
    .api-section {
      width: 100%;
      max-width: 520px;
      padding: 0.6rem 1.2rem 0;
      text-align: right;
    }
    .api-toggle {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      text-decoration: underline;
      display: inline-block;
    }
    .api-toggle:hover { color: rgba(255,255,255,0.7); }
    .api-input-wrap {
      display: none;
      gap: 0.5rem;
      margin-top: 0.4rem;
      align-items: center;
    }
    .api-input-wrap.open { display: flex; }
    .api-input-wrap input {
      flex: 1;
      padding: 0.45rem 0.9rem;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 0.8rem;
      outline: none;
    }
    .api-input-wrap input:focus { border-color: rgba(255,255,255,0.5); }
    .api-input-wrap button {
      padding: 0.45rem 1rem;
      border-radius: 10px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      cursor: pointer;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    .api-input-wrap button:hover { background: rgba(255,255,255,0.25); }

    /* ---- Main ---- */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 2rem;
      width: 100%;
      max-width: 520px;
      gap: 1.2rem;
    }

    /* ---- Stage ---- */
    .stage {
      width: 100%;
      position: relative;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 0.5rem;
    }

    /* ---- Ingredient Cards ---- */
    .ingredient-card {
      width: 130px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 1rem 0.8rem;
      text-align: center;
      opacity: 0;
      transform: translateX(0);
      transition: transform 0.55s cubic-bezier(0.23, 1, 0.32, 1),
                  opacity 0.55s ease;
      flex-shrink: 0;
    }
    #cardLeft  { transform: translateX(-260px); }
    #cardRight { transform: translateX(260px); }
    .ingredient-card.visible {
      opacity: 1;
      transform: translateX(0) !important;
    }
    .ingredient-card .emoji {
      font-size: 3rem;
      display: block;
      margin-bottom: 0.3rem;
      line-height: 1;
    }
    .ingredient-card .name {
      font-size: 0.9rem;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
    }

    /* ---- Center Area ---- */
    .center-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      flex: 1;
      position: relative;
    }
    .plus-sign {
      font-size: 2.2rem;
      font-weight: 900;
      color: rgba(255,255,255,0.8);
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .plus-sign.visible { opacity: 1; transform: scale(1); }
    .method-badge {
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      color: #1a1a2e;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.35s ease 0.15s, transform 0.35s ease 0.15s;
      white-space: nowrap;
    }
    .method-badge.visible { opacity: 1; transform: translateY(0); }

    /* ---- Explosion Overlay ---- */
    .explosion-overlay {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      pointer-events: none;
      opacity: 0;
    }
    .explosion-overlay.blast {
      animation: blastAnim 0.55s ease-out forwards;
    }
    @keyframes blastAnim {
      0%   { opacity: 0; background: radial-gradient(circle, #fff8 0%, #ffd93d88 30%, transparent 70%); transform: scale(0.3); }
      40%  { opacity: 1; background: radial-gradient(circle, #fff 0%, #ffd93d 40%, #ff6b6b55 70%, transparent 90%); transform: scale(1.2); }
      100% { opacity: 0; background: radial-gradient(circle, #fff0 0%, transparent 100%); transform: scale(2); }
    }

    /* ---- Sparkles ---- */
    .sparkle {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      left: 50%;
      top: 50%;
      pointer-events: none;
      animation: sparkleFly 0.9s ease-out forwards;
    }
    @keyframes sparkleFly {
      0%   { transform: translate(-50%, -50%) translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    /* ---- Loading ---- */
    .loading-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
      padding: 1.5rem 0;
    }
    .loading-wrap.visible { display: flex; }
    .loading-ring {
      width: 56px;
      height: 56px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #ffd93d;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      animation: breathe 1.6s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* ---- Result ---- */
    .result-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
    }
    .result-wrap.visible {
      display: flex;
      animation: revealUp 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }
    @keyframes revealUp {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .dish-name {
      font-size: 1.15rem;
      font-weight: 800;
      text-align: center;
      line-height: 1.5;
      background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-image-wrap {
      position: relative;
      width: 100%;
      max-width: 400px;
    }
    .result-image {
      width: 100%;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.15);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(255,107,107,0.15);
      display: block;
    }
    .result-note {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.35);
      text-align: center;
      margin-top: 0.3rem;
    }

    /* ---- Share Buttons ---- */
    .share-area {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .share-btn {
      padding: 0.65rem 1.4rem;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
      letter-spacing: 0.02em;
    }
    .share-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
    .share-btn:active { transform: scale(0.96); }
    .share-btn.twitter {
      background: linear-gradient(135deg, #1d9bf0, #0d6efd);
      color: #fff;
    }
    .share-btn.copy {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
    }

    /* ---- Gacha Button ---- */
    .gacha-btn {
      padding: 1.1rem 2.8rem;
      font-size: 1.25rem;
      font-weight: 900;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 50%, #6bcb77 100%);
      background-size: 200% 200%;
      color: #0d0b1e;
      letter-spacing: 0.1em;
      box-shadow: 0 8px 32px rgba(255,107,107,0.4);
      animation: gradShift 3s ease infinite;
      transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
    }
    .gacha-btn:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 14px 40px rgba(255,107,107,0.55); }
    .gacha-btn:active { transform: scale(0.97); }
    .gacha-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
    @keyframes gradShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* ---- Retry Button ---- */
    .retry-btn {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      margin-top: -0.4rem;
    }
    .retry-btn:hover { color: rgba(255,255,255,0.8); }
    .retry-btn.hidden { display: none; }

    /* ---- Error ---- */
    .error-msg {
      display: none;
      color: #ff8585;
      font-size: 0.85rem;
      text-align: center;
      padding: 0.6rem 1rem;
      background: rgba(255,107,107,0.1);
      border-radius: 10px;
      border: 1px solid rgba(255,107,107,0.3);
      max-width: 400px;
      width: 100%;
    }

    /* ---- Footer ---- */
    footer {
      padding: 1rem;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.25);
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">もしめし 🍳</div>
  <div class="subtitle">AIが生成する・謎の食材フュージョン料理</div>
</header>

<div class="api-section">
  <span class="api-toggle" onclick="toggleApiInput()">🔑 HuggingFace トークン設定</span>
  <div class="api-input-wrap" id="apiInputWrap">
    <input type="password" id="apiKeyInput" placeholder="hf_..." />
    <button onclick="saveHfToken()">保存</button>
  </div>
</div>

<main>

  <!-- ステージ -->
  <div class="stage" id="stage">
    <div class="explosion-overlay" id="explosion"></div>

    <div class="ingredient-card" id="cardLeft">
      <span class="emoji" id="emoji1">🥕</span>
      <span class="name" id="name1">にんじん</span>
    </div>

    <div class="center-area">
      <div class="plus-sign" id="plusSign">×</div>
      <div class="method-badge" id="methodBadge">炒める</div>
    </div>

    <div class="ingredient-card" id="cardRight">
      <span class="emoji" id="emoji2">🥚</span>
      <span class="name" id="name2">卵</span>
    </div>
  </div>

  <!-- ローディング -->
  <div class="loading-wrap" id="loadingWrap">
    <div class="loading-ring"></div>
    <div class="loading-text" id="loadingText">AIが料理を生み出し中...</div>
  </div>

  <!-- 結果 -->
  <div class="result-wrap" id="resultWrap">
    <div class="dish-name" id="dishName"></div>
    <div class="result-image-wrap">
      <img class="result-image" id="resultImage" src="" alt="AI生成の料理写真" />
    </div>
    <div class="result-note">※ 実際には存在しない料理です。作ってみて！</div>
    <div class="share-area">
      <button class="share-btn twitter" onclick="shareToX()">𝕏 でシェア</button>
      <button class="share-btn copy" id="copyBtn" onclick="copyText()">📋 テキストコピー</button>
    </div>
  </div>

  <!-- エラー -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- ガチャボタン -->
  <button class="gacha-btn" id="gachaBtn" onclick="startGacha()">✨ ガチャを回す ✨</button>
  <button class="retry-btn hidden" id="retryBtn" onclick="startGacha()">もう一度まわす</button>

</main>

<footer>
  Powered by Hugging Face SDXL（無料）&nbsp;|&nbsp; 株式会社HON 社内プロジェクト
</footer>

<script>
  // =====================
  //  データ
  // =====================
  const INGREDIENTS = [
    { name: 'にんじん',     emoji: '🥕' },
    { name: 'じゃがいも',   emoji: '🥔' },
    { name: '玉ねぎ',       emoji: '🧅' },
    { name: 'キャベツ',     emoji: '🥬' },
    { name: 'ほうれん草',   emoji: '🌿' },
    { name: 'なす',         emoji: '🍆' },
    { name: 'ピーマン',     emoji: '🫑' },
    { name: 'トマト',       emoji: '🍅' },
    { name: 'ブロッコリー', emoji: '🥦' },
    { name: 'かぼちゃ',     emoji: '🎃' },
    { name: 'もやし',       emoji: '🌱' },
    { name: '大根',         emoji: '🫚' },
    { name: 'れんこん',     emoji: '⭕' },
    { name: 'ごぼう',       emoji: '🪵' },
    { name: 'さつまいも',   emoji: '🍠' },
    { name: '長ねぎ',       emoji: '🌾' },
    { name: '鶏肉',         emoji: '🐔' },
    { name: '豚肉',         emoji: '🐷' },
    { name: '牛肉',         emoji: '🐄' },
    { name: '鮭',           emoji: '🐟' },
    { name: 'マグロ',       emoji: '🐡' },
    { name: 'タコ',         emoji: '🐙' },
    { name: 'イカ',         emoji: '🦑' },
    { name: 'えび',         emoji: '🦐' },
    { name: '牡蠣',         emoji: '🦪' },
    { name: 'ホタテ',       emoji: '🐚' },
    { name: '豆腐',         emoji: '⬜' },
    { name: '卵',           emoji: '🥚' },
    { name: 'チーズ',       emoji: '🧀' },
    { name: 'バナナ',       emoji: '🍌' },
    { name: 'りんご',       emoji: '🍎' },
    { name: 'いちご',       emoji: '🍓' },
    { name: 'チョコレート', emoji: '🍫' },
    { name: '納豆',         emoji: '🫘' },
    { name: 'アボカド',     emoji: '🥑' },
    { name: 'パイナップル', emoji: '🍍' },
    { name: 'スイカ',       emoji: '🍉' },
    { name: 'ちくわ',       emoji: '🍢' },
    { name: 'こんにゃく',   emoji: '🔲' },
    { name: '梅干し',       emoji: '🔴' },
    { name: 'わさび',       emoji: '💚' },
    { name: 'みそ',         emoji: '🫙' },
    { name: 'バター',       emoji: '🧈' },
    { name: 'ヨーグルト',   emoji: '🍶' },
    { name: '小麦粉',       emoji: '🌾' },
  ];

  const METHODS = [
    '炒める', '煮る', '揚げる', '焼く', '蒸す', '和える',
    '漬ける', 'グリルする', 'オーブンで焼く', 'スモークする',
    'マリネする', 'ソテーする', '天ぷらにする', '煮込む',
    '電子レンジで加熱する', '生で食べる', 'カレーにする',
    'ラーメンのトッピングにする', 'スムージーにする',
    'チーズ焼きにする', 'だし巻きにする',
  ];

  // =====================
  //  状態
  // =====================
  let currentIng1 = null;
  let currentIng2 = null;
  let currentMethod = null;
  let isRunning = false;

  // =====================
  //  HuggingFace トークン
  // =====================
  function toggleApiInput() {
    const wrap = document.getElementById('apiInputWrap');
    wrap.classList.toggle('open');
    if (wrap.classList.contains('open')) {
      document.getElementById('apiKeyInput').value = localStorage.getItem('moshimeshi_hf_token') || '';
      document.getElementById('apiKeyInput').focus();
    }
  }
  function saveHfToken() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) return;
    localStorage.setItem('moshimeshi_hf_token', key);
    document.getElementById('apiInputWrap').classList.remove('open');
  }
  function getHfToken() {
    return localStorage.getItem('moshimeshi_hf_token') || '';
  }

  // =====================
  //  ユーティリティ
  // =====================
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function pickTwo(arr) {
    const i = Math.floor(Math.random() * arr.length);
    let j;
    do { j = Math.floor(Math.random() * arr.length); } while (j === i);
    return [arr[i], arr[j]];
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideError() {
    document.getElementById('errorMsg').style.display = 'none';
  }

  function flashSuccess(msg) {
    const btn = document.getElementById('gachaBtn');
    const orig = btn.textContent;
    btn.textContent = msg;
    setTimeout(() => { btn.textContent = orig; }, 2000);
  }

  // =====================
  //  スパークル
  // =====================
  function createSparkles(stage) {
    const colors = ['#ffd93d', '#ff6b6b', '#6bcb77', '#4d96ff', '#fff', '#ff9bff'];
    for (let i = 0; i < 24; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      const angle = (Math.PI * 2 * i) / 24 + (Math.random() - 0.5) * 0.4;
      const dist = 50 + Math.random() * 90;
      s.style.setProperty('--tx', `${Math.cos(angle) * dist}px`);
      s.style.setProperty('--ty', `${Math.sin(angle) * dist}px`);
      s.style.background = colors[Math.floor(Math.random() * colors.length)];
      s.style.width = `${5 + Math.random() * 7}px`;
      s.style.height = s.style.width;
      s.style.animationDelay = `${Math.random() * 0.25}s`;
      s.style.animationDuration = `${0.7 + Math.random() * 0.4}s`;
      stage.appendChild(s);
      s.addEventListener('animationend', () => s.remove());
    }
  }

  // =====================
  //  メインガチャ
  // =====================
  async function startGacha() {
    if (isRunning) return;

    isRunning = true;
    hideError();
    document.getElementById('gachaBtn').disabled = true;
    document.getElementById('retryBtn').classList.add('hidden');
    document.getElementById('resultWrap').classList.remove('visible');
    document.getElementById('loadingWrap').classList.remove('visible');

    // 食材・調理法を選ぶ
    const [ing1, ing2] = pickTwo(INGREDIENTS);
    const method = pickRandom(METHODS);
    currentIng1 = ing1;
    currentIng2 = ing2;
    currentMethod = method;

    // カードの中身をセット
    document.getElementById('emoji1').textContent = ing1.emoji;
    document.getElementById('name1').textContent  = ing1.name;
    document.getElementById('emoji2').textContent = ing2.emoji;
    document.getElementById('name2').textContent  = ing2.name;
    document.getElementById('methodBadge').textContent = `🍳 ${method}`;

    // カードをリセット（瞬間移動）
    const cardL = document.getElementById('cardLeft');
    const cardR = document.getElementById('cardRight');
    const plus  = document.getElementById('plusSign');
    const badge = document.getElementById('methodBadge');
    const stage = document.getElementById('stage');
    const explosion = document.getElementById('explosion');

    // トランジションを一時無効化してリセット
    cardL.style.transition = 'none';
    cardR.style.transition = 'none';
    cardL.classList.remove('visible');
    cardR.classList.remove('visible');
    plus.classList.remove('visible');
    badge.classList.remove('visible');
    cardL.style.transform = 'translateX(-260px)';
    cardR.style.transform = 'translateX(260px)';

    await sleep(30);

    // フライイン
    cardL.style.transition = '';
    cardR.style.transition = '';
    cardL.classList.add('visible');
    cardR.classList.add('visible');

    await sleep(650);

    // ×とバッジを表示
    plus.classList.add('visible');
    badge.classList.add('visible');

    await sleep(1100);

    // マージアニメーション（中央に向かって飛ぶ）
    const stageRect = stage.getBoundingClientRect();
    const lRect = cardL.getBoundingClientRect();
    const rRect = cardR.getBoundingClientRect();
    const cx = stageRect.left + stageRect.width / 2;
    const lOffset = cx - (lRect.left + lRect.width / 2);
    const rOffset = cx - (rRect.left + rRect.width / 2);

    cardL.style.transition = 'transform 0.38s ease-in, opacity 0.2s ease 0.2s';
    cardR.style.transition = 'transform 0.38s ease-in, opacity 0.2s ease 0.2s';
    cardL.style.transform = `translateX(${lOffset}px)`;
    cardR.style.transform = `translateX(${rOffset}px)`;
    cardL.style.opacity = '0';
    cardR.style.opacity = '0';
    plus.classList.remove('visible');
    badge.classList.remove('visible');

    await sleep(420);

    // 爆発エフェクト
    explosion.classList.remove('blast');
    void explosion.offsetWidth; // reflow
    explosion.classList.add('blast');
    createSparkles(stage);

    await sleep(600);

    // カードを見えなくする
    cardL.classList.remove('visible');
    cardR.classList.remove('visible');

    // ローディング表示
    document.getElementById('loadingText').textContent = 'AIが料理を生み出し中...';
    document.getElementById('loadingWrap').classList.add('visible');

    // API呼び出し
    try {
      await generateImage(ing1.name, ing2.name, method);
      document.getElementById('loadingWrap').classList.remove('visible');

      // 結果表示
      const dishLabel = `${ing1.name} × ${ing2.name}を${method}`;
      document.getElementById('dishName').textContent = `「${dishLabel}」したらこうなった🔥`;
      document.getElementById('resultWrap').classList.add('visible');
      document.getElementById('retryBtn').classList.remove('hidden');

    } catch (err) {
      document.getElementById('loadingWrap').classList.remove('visible');
      showError(`エラー: ${err.message}`);
      document.getElementById('retryBtn').classList.remove('hidden');
    }

    document.getElementById('gachaBtn').disabled = false;
    isRunning = false;
  }

  // =====================
  //  Hugging Face Inference API（無料・要無料アカウント）
  //  モデル: stabilityai/stable-diffusion-xl-base-1.0
  // =====================
  async function generateImage(ing1, ing2, method) {
    const hfToken = getHfToken();
    if (!hfToken) throw new Error('Hugging Face トークンを設定してください（右上の🔑マーク）');

    const prompt =
      `professional food photography of a Japanese fusion dish with ${ing1} and ${ing2}, ` +
      `${method}, beautifully plated, restaurant quality, appetizing, soft natural lighting, ` +
      `shallow depth of field, vibrant colors, social media style`;

    console.log('[もしめし] HF生成開始:', prompt);

    const controller = new AbortController();
    const tid = setTimeout(() => controller.abort(), 90000);

    let res;
    try {
      res = await fetch(
        'https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-xl-base-1.0',
        {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${hfToken}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ inputs: prompt }),
          signal: controller.signal,
        }
      );
    } catch (err) {
      clearTimeout(tid);
      if (err.name === 'AbortError') throw new Error('タイムアウト（90秒）。もう一度お試しください。');
      throw new Error(`ネットワークエラー: ${err.message}`);
    }
    clearTimeout(tid);

    if (res.status === 503) {
      // モデルロード中（HFあるある）→ 少し待ってリトライ案内
      const json = await res.json().catch(() => ({}));
      const wait = json.estimated_time ? `約${Math.ceil(json.estimated_time)}秒` : '少し';
      throw new Error(`モデル起動中です（${wait}待ってからもう一度お試しください）`);
    }
    if (!res.ok) {
      const text = await res.text().catch(() => '');
      throw new Error(`APIエラー (${res.status}): ${text.slice(0, 120)}`);
    }

    const contentType = res.headers.get('content-type') || '';
    if (!contentType.startsWith('image/')) {
      const text = await res.text();
      throw new Error(`予期しないレスポンス: ${text.slice(0, 120)}`);
    }

    const blob   = await res.blob();
    const blobUrl = URL.createObjectURL(blob);

    // img に反映
    const imgEl = document.getElementById('resultImage');
    return new Promise((resolve, reject) => {
      const t = setTimeout(() => {
        imgEl.onload = imgEl.onerror = null;
        reject(new Error('画像の読み込みタイムアウト。もう一度お試しください。'));
      }, 15000);
      imgEl.onload = () => { clearTimeout(t); imgEl.onload = imgEl.onerror = null; resolve(); };
      imgEl.onerror = () => { clearTimeout(t); imgEl.onload = imgEl.onerror = null; reject(new Error('画像の表示に失敗しました。')); };
      imgEl.src = blobUrl;
    });
  }

  // =====================
  //  シェア
  // =====================
  function shareToX() {
    if (!currentIng1) return;
    const text =
      `「${currentIng1.name} × ${currentIng2.name} を${currentMethod}」したら` +
      `こんな料理になった🍳✨\n\n` +
      `実際に作ってみたくなった？😏\n\n` +
      `#もしめし #AIごはん #フードフュージョン`;
    window.open(`https://x.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
  }

  function copyText() {
    if (!currentIng1) return;
    const text =
      `「${currentIng1.name} × ${currentIng2.name} を${currentMethod}」したら` +
      `AIがこんな料理を作り出した🍳✨ #もしめし #AIごはん`;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✓ コピーしました！';
      setTimeout(() => { btn.textContent = '📋 テキストコピー'; }, 2200);
    }).catch(() => {
      showError('コピーに失敗しました。');
    });
  }
